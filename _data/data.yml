career-profile:
    title: Career Profile
    summary: |
      I'm a Solutions Engineering leader with a passion for connecting technology, business value, and people.
      
      At Okta, I lead Solutions Engineering teams across Central and Eastern Europe, helping organizations solve identity, security, and digital transformation challenges. My focus is on building high-performing teams, supporting enterprise growth, and turning complex technical topics into clear business outcomes.
      
      While I lead teams and strategy, I still enjoy staying hands-on with technology. I like exploring new tools - especially AI - working through technical challenges, and keeping a close connection to the practical side of Solutions Engineering. Building relationships with prospects and customers through ongoing dialogue is something I genuinely enjoy.
      
      Over the years, I've worked across PreSales, enterprise technology, and customer-facing leadership roles. What I enjoy most is bringing together technical depth, commercial thinking, and strong collaboration to help customers move forward with confidence.
      
      I started my journey in the IT world with 'dual studies' (apprenticeship and studies combined) at Siemens AG. After a few years of application management for Microsoft SharePoint and Project Server at PSoD, I took on a new challenge at AvePoint (ISV and Microsoft Partner) and started my career in the PreSales field. With Okta I continued my journey in PreSales and later grew into leadership, leading teams across Central & Eastern Europe.
      
      I'm especially interested in identity, security, AI, and the role technology plays in improving productivity, decision-making, and everyday work.
      
      People who work with me would probably say I'm open-minded, positive, and focused on finding practical solutions that create real impact.
